<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planify - Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="page-home">

<header>
  <div class="header-left">
    <a class="logo" href="index.html">Planify</a>
    <div class="tagline">Home</div>
  </div>
  <div class="header-right">
    <details class="settings-menu">
      <summary class="btn-print settings-btn">Settings</summary>
      <div class="settings-panel">
        <label class="toggle-row">
          <span>Dark mode</span>
          <span class="toggle">
            <input type="checkbox" id="darkModeToggle" />
            <span class="switch"></span>
          </span>
        </label>
      </div>
    </details>
  </div>
</header>

<canvas class="home-bg" id="homeBg" aria-hidden="true"></canvas>
<main>
  <section class="home-hero">
    <div class="home-title">Planify</div>
    <button class="btn-generate home-cta" id="homeGetStartedBtn" type="button">Get started</button>
  </section>
</main>

<script src="js/storage.js"></script>
<script src="js/pages.js"></script>
<script src="js/theme.js"></script>
<script src="js/home.js"></script>
<script src="js/home-bg.js"></script>
</body>
</html>
