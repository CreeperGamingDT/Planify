<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planify - Smart Task Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="page-generate">

<header>
  <div class="header-left">
    <a class="logo" href="index.html">Planify</a>
    <div class="tagline">Developing Schedule</div>
  </div>
  <div class="header-right">
    <details class="settings-menu">
      <summary class="btn-print settings-btn">Settings</summary>
      <div class="settings-panel">
        <label class="toggle-row">
          <span>Dark mode</span>
          <span class="toggle">
            <input type="checkbox" id="darkModeToggle" />
            <span class="switch"></span>
          </span>
        </label>
      </div>
    </details>
  </div>
</header>

<div class="page-actions">
  <a class="btn-print" href="schedules.html">View schedules</a>
</div>

<main>
  <!-- ── Sidebar ── -->
  <section class="sidebar generate-center">

    <div class="field-group">
      <div class="section-label">Your Goal</div>
      <label for="objective">Objective</label>
      <input type="text" id="objective" class="obj-input" placeholder="e.g. Learn Spanish conversational basics…" />
    </div>

    <div class="field-group">
      <div class="section-label">Notes & Context</div>
      <label>Upload a document <em style="font-weight:300;color:var(--ink-muted)">(optional)</em></label>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".txt,.md,.doc,.docx" />
        <span class="dz-icon">📄</span>
        <div class="dz-text"><strong>Drop a file</strong> or click to browse<br>.txt · .md · .doc · .docx</div>
        <div class="file-name" id="fileName"></div>
      </div>
      <div class="divider">or type notes</div>
      <textarea id="notes" placeholder="Paste any notes, topics, details, or knowledge about yourself here. The AI will use these to build your schedule..."></textarea>
    </div>

    <div class="field-group">
      <div class="section-label">Timeframe</div>
      <div class="date-row">
        <div>
          <label for="startDate">Start date</label>
          <input type="date" id="startDate" />
        </div>
        <div>
          <label for="finishDays">Time to finish (days)</label>
          <input type="number" id="finishDays" min="1" max="365" value="7" />
        </div>
      </div>
    </div>

    <div class="field-group">
      <div class="section-label">Daily Time</div>
      <div class="time-row">
        <div>
          <label for="hoursPerDay">Hours / day</label>
          <div class="unit-input">
            <input type="number" id="hoursPerDay" min="0" max="12" value="0" />
            <span class="unit">hrs</span>
          </div>
        </div>
        <div>
          <label for="minutesPerDay">Minutes</label>
          <div class="unit-input">
            <input type="number" id="minutesPerDay" min="0" max="59" value="30" />
            <span class="unit">min</span>
          </div>
        </div>
      </div>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <button class="btn-generate" id="generateBtn" onclick="generateSchedule()">
      <div class="spinner"></div>
      <span class="btn-arrow">✦</span>
      <span id="btnText">Generate Schedule</span>
    </button>

  </section>

</main>

<script src="js/utils.js"></script>
<script src="js/init-dates.js"></script>
<script src="js/file-handling.js"></script>
<script src="js/errors.js"></script>
<script src="js/storage.js"></script>
<script src="js/pages.js"></script>
<script src="js/theme.js"></script>
<script src="js/objective-placeholder.js"></script>
<script src="js/schedule.js"></script>
<script src="js/taglines.js"></script>
<script src="js/debug.js"></script>
</body>
</html>
